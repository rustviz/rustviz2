name: deploy

# Runs on every push to main and on manual workflow_dispatch. Calls
# deploy/deploy.sh, NOT `flyctl deploy` directly: the script does the
# two-phase deploy the playground needs (phase 1: fly scale + fly deploy
# with auto_stop_machines='off' so Machines survive the cold-pull
# bootstrap window; phase 2: per-Machine `fly machine update --autostop=stop`
# so the fleet idles cheaply in steady state). A plain `flyctl deploy`
# skips phase 2 and leaves every Machine pinned at auto_stop='off' —
# i.e. always-running, ~$24/mo per Machine.
#
# Requires a FLY_API_TOKEN secret in repo Settings → Secrets → Actions.
# `permissions: issues: write` is needed for the failure-notification
# step that opens a deploy-failed issue if the deploy errors.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    name: deploy.sh
    runs-on: ubuntu-latest
    # deploy.sh's phase 1 cold-pulls the runner image on every fresh
    # Machine through fuse-overlayfs (5-15 min/Machine, parallelized
    # via --strategy immediate). Phase 2's per-Machine fly machine
    # update adds a few more minutes. Total wallclock ~15-25 min in
    # practice; bump if you see CI timing out.
    timeout-minutes: 45
    # Serialize deploys so a second push to main during a deploy doesn't
    # double-pump the fleet. cancel-in-progress=false because aborting
    # mid-deploy can leave the fleet in a half-rolled state.
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # ubuntu-latest already has jq, but assert it explicitly so a
      # future runner-image change doesn't silently break the script.
      - name: verify jq
        run: jq --version
      - name: deploy.sh
        run: ./deploy/deploy.sh
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # Open a tracking issue on failure so the failure surfaces in the
      # repo's Issues tab, not just in the email-notification firehose.
      # Default GitHub email-on-workflow-failure still fires too.
      - name: open issue on deploy failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failed at ${sha}`,
              body: [
                `The \`deploy\` workflow failed for commit ${sha}.`,
                ``,
                `Run: ${runUrl}`,
                ``,
                `This issue was opened automatically by \`.github/workflows/deploy.yml\` on workflow failure. Investigate the run, fix the underlying issue, and close this issue once the next successful deploy lands.`,
              ].join('\n'),
              labels: ['deploy-failure'],
            });
