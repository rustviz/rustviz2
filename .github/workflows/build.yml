name: build

on:
  push:
    branches: [main]
  # Run for PRs against any base so the stacked chore/phase-* branches get CI
  # on every push, not only when they're rebased onto main.
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain || rustup show
          rustc --version
          cargo --version

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: rv-serve/frontend/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run setup.sh (toolchain, plugin install, frontend build, runner image)
        run: ./setup.sh

      - name: cargo build --workspace
        run: cargo build --workspace --locked

      - name: cargo test --workspace
        run: cargo test --workspace --locked
        # Plugin tests exercise rustc-private; allow this to be informational
        # rather than blocking until we add a stable test corpus.
        continue-on-error: true

      - name: Smoke test the playground end-to-end (sandboxed backend)
        env:
          RV_RUNNER: docker
        run: |
          # Use --locked to surface lockfile drift; spawn rv-serve in the
          # background and wait for /. Then POST a small program and confirm
          # we get back both SVGs.
          (cd rv-serve && RV_RUNNER=docker cargo run --release --locked &) &&
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8080/ > /dev/null && break || sleep 1
          done
          curl -fsS -X POST http://127.0.0.1:8080/submit-code \
            -H 'Content-Type: application/json' \
            -d '{"code":"fn main(){let s=String::from(\"hi\");let t=s;println!(\"{}\",t);}"}' \
            | grep -q '"code_panel"'

      - name: Smoke test rate limit (expects 429 after burst exhausted)
        run: |
          ok=0
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
              http://127.0.0.1:8080/submit-code \
              -H 'Content-Type: application/json' \
              -d '{"code":"fn main(){}"}')
            echo "request $i -> $code"
            if [ "$code" = "429" ]; then ok=1; break; fi
          done
          [ "$ok" = "1" ] || { echo "rate limit never engaged"; exit 1; }
