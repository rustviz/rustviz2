name: build-and-deploy

on:
  push:
    branches: [main]
  # Run for PRs against any base so the stacked chore/phase-* branches get CI
  # on every push, not only when they're rebased onto main.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # for the issue-on-failure step in the deploy job
  issues: write
  # for the runner-image job to push to GHCR
  packages: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain || rustup show
          rustc --version
          cargo --version

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: rv-serve/frontend/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run setup.sh (toolchain, plugin install, frontend build, runner image)
        run: ./setup.sh

      - name: cargo build --workspace
        run: cargo build --workspace --locked

      - name: cargo test --workspace
        env:
          # Corpus tests use the in-process plugin path (faster than spinning
          # up a fresh runner container per case, and we're not testing
          # sandboxing here). The plugin itself was installed by setup.sh.
          RV_RUNNER: local
        run: cargo test --workspace --locked

      - name: Smoke test the playground end-to-end (sandboxed backend)
        env:
          RV_RUNNER: docker
        run: |
          # Use --locked to surface lockfile drift; spawn rv-serve in the
          # background and wait for /. Then POST a small program and confirm
          # we get back both SVGs.
          (cd rv-serve && RV_RUNNER=docker cargo run --release --locked &) &&
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8080/ > /dev/null && break || sleep 1
          done
          curl -fsS -X POST http://127.0.0.1:8080/submit-code \
            -H 'Content-Type: application/json' \
            -d '{"code":"fn main(){let s=String::from(\"hi\");let t=s;println!(\"{}\",t);}"}' \
            | grep -q '"code_panel"'

      - name: Smoke test rate limit (expects 429 after burst exhausted)
        run: |
          ok=0
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
              http://127.0.0.1:8080/submit-code \
              -H 'Content-Type: application/json' \
              -d '{"code":"fn main(){}"}')
            echo "request $i -> $code"
            if [ "$code" = "429" ]; then ok=1; break; fi
          done
          [ "$ok" = "1" ] || { echo "rate limit never engaged"; exit 1; }

  # Build the rustviz/rustviz-runner sandbox image (per-request docker
  # container that compiles user-submitted Rust) and push it to GHCR.
  # The deploy image's entrypoint pulls from this registry on first
  # boot of each Fly Machine. Lives alongside `build` so deploy can
  # gate on both — keeping `runner-image` in a separate workflow risks
  # deploying tested plugin code against a stale `:latest` if the two
  # workflows finish in a different order.
  #
  # Only runs on real pushes to main (PRs don't push to GHCR).
  runner-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      REGISTRY: ghcr.io
      # Lower-case so docker tag is happy on case-insensitive filesystems too.
      IMAGE_NAME: rustviz/rustviz-runner
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runner/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # amd64 is what Fly Machines run in production; arm64 lets us
          # pull and run the image locally on Apple Silicon dev boxes for
          # debugging without cross-emulation overhead. Roughly doubles the
          # workflow runtime; with the registry buildcache below it stays
          # well under the timeout-minutes ceiling.
          platforms: linux/amd64,linux/arm64
          # Keep an inline registry cache so reruns reuse layers.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # Deploy job, gated on build AND runner-image success and on a real
  # push to main (so PR runs build but never deploy). Calls
  # deploy/deploy.sh, NOT `flyctl deploy` directly — the script does
  # the two-phase deploy the playground needs (phase 1: fly scale +
  # fly deploy with auto_stop_machines='off' so Machines survive the
  # cold-pull bootstrap; phase 2: per-Machine `fly machine update
  # --autostop=stop` so the fleet idles cheaply in steady state). A
  # plain `flyctl deploy` skips phase 2 and leaves every Machine
  # pinned at auto_stop='off', i.e. always-running, ~$24/mo per
  # Machine.
  #
  # Requires a FLY_API_TOKEN secret in Settings → Secrets → Actions.
  deploy:
    needs: [build, runner-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # deploy.sh's phase 1 cold-pulls the runner image on every fresh
    # Machine through fuse-overlayfs (5-15 min/Machine, parallelized
    # via --strategy immediate). When a Machine gets stuck mid-pull
    # (transient FUSE / GHCR flakiness), deploy.sh's retry path
    # destroys + recreates and waits again — RV_DEPLOY_TIMEOUT_SECS
    # × (RV_DEPLOY_RETRIES + 1) is the Phase 1 wait budget, default
    # 30 min × 2 = 60 min. Plus Phase 2 (~few min) and fly deploy
    # orchestration (~5 min). Worst-case observed: ~55 min. 90 leaves
    # comfortable headroom; bump if you see CI hitting the cap.
    timeout-minutes: 90
    # Serialize deploys so a second push to main during a deploy doesn't
    # double-pump the fleet. cancel-in-progress=false because aborting
    # mid-deploy can leave the fleet in a half-rolled state.
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # ubuntu-latest already has jq, but assert it explicitly so a
      # future runner-image change doesn't silently break the script.
      - name: verify jq
        run: jq --version
      - name: deploy.sh
        run: ./deploy/deploy.sh
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # Open a tracking issue on failure so the failure surfaces in the
      # repo's Issues tab, not just in the email-notification firehose.
      # Default GitHub email-on-workflow-failure still fires too.
      - name: open issue on deploy failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failed at ${sha}`,
              body: [
                `The deploy job failed for commit ${sha}.`,
                ``,
                `Run: ${runUrl}`,
                ``,
                `This issue was opened automatically by \`.github/workflows/build.yml\` on workflow failure. Investigate the run, fix the underlying issue, and close this issue once the next successful deploy lands.`,
              ].join('\n'),
              labels: ['deploy-failure'],
            });
