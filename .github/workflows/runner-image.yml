name: runner-image

# Builds the rustviz/rustviz-runner sandbox image (the per-request docker
# container that compiles user-submitted Rust) and pushes it to GHCR.
# The deploy image's entrypoint pulls from this registry on first boot of
# each Fly Machine, so building horizontally-scalable Machines becomes a
# `fly scale count N` rather than provisioning N volumes for N
# build-once-per-Machine bootstraps.

on:
  push:
    branches: [main]
    paths:
      # Only rebuild when something that affects the runner image changes.
      - 'runner/**'
      - 'rustviz2-plugin/**'
      - 'rust-toolchain.toml'
      - 'Cargo.lock'
      - '.github/workflows/runner-image.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Lower-case so docker tag is happy on case-insensitive filesystems too.
  IMAGE_NAME: rustviz/rustviz-runner

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runner/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Keep an inline registry cache so reruns reuse layers.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
