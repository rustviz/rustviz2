# fly.toml app configuration file generated for rustviz-playground on 2026-04-27T00:06:33+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rustviz-playground'
primary_region = 'ord'

[experimental]
  # Required: the deploy image runs Docker-in-Docker so rv-serve can shell out
  # to a per-request sandboxed runner (see SECURITY.md). The inner dockerd
  # needs to manage cgroups / namespaces / overlayfs, which only works when
  # the Fly Machine itself is privileged.
  privileged = true

[build]
  dockerfile = 'Dockerfile'

[env]
  RV_BIND = '0.0.0.0:8080'
  RV_RATE_BURST = '5'
  RV_RATE_SECONDS_PER_REQUEST = '2'
  RV_RUNNER = 'docker'

[[mounts]]
  source = 'rustviz_docker'
  destination = '/var/lib/docker'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep at 0 in the canonical config so the Machine auto-stops when idle
  # (~$2-3/mo cost). `deploy/deploy.sh` flips this to 1 temporarily during
  # deploys so Fly's autoscaler doesn't kill the Machine while it bootstraps
  # the inner runner Docker image, then flips it back.
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
