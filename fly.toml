# fly.toml app configuration file generated for rustviz-playground on 2026-04-27T00:06:33+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rustviz-playground'
primary_region = 'ord'

[experimental]
  # Required: the deploy image runs Docker-in-Docker so rv-serve can shell out
  # to a per-request sandboxed runner (see SECURITY.md). The inner dockerd
  # needs to manage cgroups / namespaces / overlayfs, which only works when
  # the Fly Machine itself is privileged.
  privileged = true

[build]
  dockerfile = 'Dockerfile'

[env]
  RV_BIND = '0.0.0.0:8080'
  RV_RATE_BURST = '5'
  RV_RATE_SECONDS_PER_REQUEST = '2'
  RV_RUNNER = 'docker'

# No `[[mounts]]` block: dockerd uses the fuse-overlayfs storage driver
# (configured in deploy/entrypoint.sh and packaged in the deploy image),
# which works on top of the Fly Machine's overlay rootfs without needing
# a per-Machine ext4 volume. The kernel doesn't support nested overlay2
# (which is why the previous /var/lib/docker volume existed); fuse-overlayfs
# sidesteps the limitation by doing the overlay in userspace via FUSE.
#
# If you need to fall back to overlay2 + a volume (e.g. fuse-overlayfs
# turns out to be too slow under real load), reinstate:
#   [[mounts]]
#     source = 'rustviz_docker'
#     destination = '/var/lib/docker'
#     initial_size = '3gb'
# and switch the storage driver back in deploy/entrypoint.sh.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep at 0 in the canonical config so the Machine auto-stops when idle
  # (~$2-3/mo cost). `deploy/deploy.sh` flips this to 1 temporarily during
  # deploys so Fly's autoscaler doesn't kill the Machine while it bootstraps
  # the inner runner Docker image (pulling from GHCR takes ~30 s), then
  # flips it back.
  min_machines_running = 0

  # Concurrency thresholds the edge proxy uses to decide when to spill load
  # to a second Machine in the fleet. Defaults are tuned for cheap web apps
  # (~hundreds of concurrent connections per Machine) — way too high for our
  # workload, where each Machine maxes out at ~4 concurrent compile
  # containers. With these values, Fly starts spilling to a second Machine
  # the moment a fourth concurrent /submit-code lands, and avoids piling
  # an HN-class spike onto a single Machine until OOM. Fleet size itself is
  # set server-side via `fly scale count N` and maintained by deploy.sh.
  [http_service.concurrency]
    type = 'requests'
    soft_limit = 3
    hard_limit = 5

  # HTTP check: only route requests to a Machine once GET / returns 200.
  # rv-serve binds 8080 only at the very end of entrypoint.sh — after dockerd
  # has come up and the runner image is pulled — so a passing check means
  # the Machine is genuinely ready to serve, not just half-bootstrapped.
  #
  # During phase 1 of deploy/deploy.sh, Machines pull the ~1 GiB runner
  # image from GHCR and extract through fuse-overlayfs (10-30 min on
  # cold start). The 1m grace_period is NOT what protects us during that
  # window — fly clamps grace_period to 1 minute regardless of what we
  # set here ("WARN Service HTTP check has a grace period greater than 1
  # minute … this will be lowered to 1 minute"). What actually protects
  # the bootstrap is `auto_stop_machines = 'off'` set by deploy.sh in
  # phase 1, plus deploy.sh's per-Machine health-check polling loop with
  # its own RV_DEPLOY_TIMEOUT_SECS (default 30 min). Setting grace_period
  # any higher than 1m here just creates a misleading config + a noisy
  # validate-time warning.
  [[http_service.checks]]
    # 60s rather than the default 10s: at 10 Machines × 6 checks/min the
    # default produces ~86k log lines per Machine per day of pure noise
    # (User-Agent: "Consul Health Check") and burns CPU on dind for nothing
    # interesting. 60s still detects a wedged Machine within a minute,
    # which is fine for a research tool with sparse traffic. These checks
    # come over Fly's private 6PN network, not through fly-proxy, so they
    # don't interfere with auto_stop's idle-traffic accounting.
    interval = '60s'
    grace_period = '1m'
    method = 'GET'
    path = '/'
    timeout = '5s'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
