# fly.toml app configuration file generated for rustviz-playground on 2026-04-27T00:06:33+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rustviz-playground'
primary_region = 'ord'

[experimental]
  # Required: the deploy image runs Docker-in-Docker so rv-serve can shell out
  # to a per-request sandboxed runner (see SECURITY.md). The inner dockerd
  # needs to manage cgroups / namespaces / overlayfs, which only works when
  # the Fly Machine itself is privileged.
  privileged = true

[build]
  dockerfile = 'Dockerfile'

[env]
  RV_BIND = '0.0.0.0:8080'
  RV_RATE_BURST = '5'
  RV_RATE_SECONDS_PER_REQUEST = '2'
  RV_RUNNER = 'docker'

# Each Machine needs its own volume mounted at /var/lib/docker. Without
# this, dockerd inside the Machine fails to start with
# "failed to mount overlay: invalid argument" because the Machine's
# rootfs is itself an overlay filesystem, and the kernel doesn't support
# overlay-on-overlay for dockerd's overlay2 storage driver. The volume
# is a real ext4 filesystem where overlay2 works fine.
#
# Fly creates a volume per Machine on first deploy (auto-named with the
# `source` below). With `fly scale count 10`, you'll end up with 10
# volumes at ~3 GB each (`initial_size`), costing ~$4.50/mo total at
# $0.15/GB. The size is sufficient for the ~1 GiB runner image plus
# dockerd's working layers.
[[mounts]]
  source = 'rustviz_docker'
  destination = '/var/lib/docker'
  initial_size = '3gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep at 0 in the canonical config so the Machine auto-stops when idle
  # (~$2-3/mo cost). `deploy/deploy.sh` flips this to 1 temporarily during
  # deploys so Fly's autoscaler doesn't kill the Machine while it bootstraps
  # the inner runner Docker image (pulling from GHCR takes ~30 s), then
  # flips it back.
  min_machines_running = 0

  # Concurrency thresholds the edge proxy uses to decide when to spill load
  # to a second Machine in the fleet. Defaults are tuned for cheap web apps
  # (~hundreds of concurrent connections per Machine) — way too high for our
  # workload, where each Machine maxes out at ~4 concurrent compile
  # containers. With these values, Fly starts spilling to a second Machine
  # the moment a fourth concurrent /submit-code lands, and avoids piling
  # an HN-class spike onto a single Machine until OOM. Fleet size itself is
  # set server-side via `fly scale count N` and maintained by deploy.sh.
  [http_service.concurrency]
    type = 'requests'
    soft_limit = 3
    hard_limit = 5

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
